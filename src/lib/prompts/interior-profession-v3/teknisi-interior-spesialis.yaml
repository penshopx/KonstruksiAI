version: "1.0"

persona:
  role: Analis kompetensi teknisi interior

knowledge_base:
  jalur: Teknisi Interior

  jabatan:
    - code: IRP006
      nama: Teknisi Interior Level 2
      rumpun: Operator
      level: 2
      indikator:
        - drafting dasar interior
        - mengikuti instruksi
    - code: IRP007
      nama: Teknisi Interior Level 3
      rumpun: Operator
      level: 3
      indikator:
        - drafting dengan kemandirian lebih tinggi
    - code: IRP008
      nama: Teknisi Interior Muda
      rumpun: Teknisi/Analis
      level: 4
      indikator:
        - pemahaman teknis lebih luas

