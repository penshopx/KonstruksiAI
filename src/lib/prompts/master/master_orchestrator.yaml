master_routing:
  rules:
    - if: "permintaan terkait strategi bisnis aplikasi atau superapp konstruksi"
      use_orchestrators:
        - "business_construction_orchestrator"
        - "software_engineering_orchestrator"

    - if: "permintaan terkait ERP, workflow, dan implementasi produk digital"
      use_orchestrators:
        - "business_construction_orchestrator"
        - "software_engineering_orchestrator"

    - if: "permintaan terkait sistem MEP listrik"
      use_orchestrators:
        - "business_construction_orchestrator"
        - "electrical_engineering_orchestrator"

    - if: "permintaan terkait sistem MEP mekanikal"
      use_orchestrators:
        - "business_construction_orchestrator"
        - "mechanical_orchestrator"

    - if: "permintaan terkait AMDAL, UKL-UPL, atau kajian lingkungan"
      use_orchestrators:
        - "environment_orchestrator"

    - if: "permintaan terkait desain arsitektur, space planning, atau concept design"
      use_orchestrators:
        - "architecture_orchestrator"

    - if: "permintaan terkait façade, material, atau building envelope"
      use_orchestrators:
        - "architecture_orchestrator"

    - if: "permintaan terkait site planning atau massing"
      use_orchestrators:
        - "architecture_orchestrator"
        - "civil_orchestrator"

    - if: "permintaan terkait pengelolaan limbah atau waste management"
      use_orchestrators:
        - "environment_orchestrator"

    - if: "permintaan terkait sustainability gedung atau fasilitas"
      use_orchestrators:
        - "architecture_orchestrator"
        - "environment_engineering_orchestrator"
        - "mechanical_orchestrator"
        - "electrical_engineering_orchestrator"
        - "civil_orchestrator"

    - if: "permintaan terkait struktur, biaya, jadwal, dan metode pelaksanaan"
      use_orchestrators:
        - "civil_orchestrator"
        - "business_construction_orchestrator"

    - if: "permintaan terkait proyek bangunan lengkap"
      use_orchestrators:
        - "architecture_orchestrator"
        - "civil_orchestrator"
        - "electrical_engineering_orchestrator"
        - "mechanical_orchestrator"
        - "environment_orchestrator"
        - "business_construction_orchestrator"

    - if: "permintaan terkait desain gedung dan utilitas bangunan"
      use_orchestrators:
        - "architecture_orchestrator"
        - "civil_orchestrator"
        - "electrical_engineering_orchestrator"
        - "mechanical_orchestrator"
        - "environment_orchestrator"

    - if: "permintaan terkait konsep design yang berdampak ke struktur, façade, dan utilitas"
      use_orchestrators:
        - "architecture_orchestrator"
        - "civil_orchestrator"
        - "mechanical_orchestrator"
        - "electrical_engineering_orchestrator"

    - if: "permintaan terkait operasi fasilitas, maintenance, dan efficiency"
      use_orchestrators:
        - "mechanical_orchestrator"
        - "electrical_engineering_orchestrator"
        - "environment_orchestrator"

    - if: "permintaan terkait MEP execution"
      use_orchestrators:
        - "mechanical_orchestrator"
        - "electrical_engineering_orchestrator"
        - "civil_orchestrator"

    - if: "permintaan terkait pengelolaan proyek yang perlu environmental monitoring"
      use_orchestrators:
        - "environment_orchestrator"
        - "business_construction_orchestrator"

    - if: "permintaan terkait produk KonstruksiAI yang perlu PRD, arsitektur, dan use case konstruksi"
      use_orchestrators:
        - "software_engineering_orchestrator"
        - "business_construction_orchestrator"
        - "civil_orchestrator"
        - "electrical_engineering_orchestrator"
        - "mechanical_orchestrator"
        - "environment_orchestrator"
        - "architecture_orchestrator"

    - if: "permintaan terkait landscape, taman, atau ruang luar"
      use_orchestrators:
        - "landscape_orchestrator"

    - if: "permintaan terkait interior, fit-out, atau desain ruang dalam"
      use_orchestrators:
        - "interior_orchestrator"

    - if: "permintaan terkait pencahayaan, lighting, atau illumination"
