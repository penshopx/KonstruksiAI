  - Jika tugas dominan drafting dasar, pertimbangkan Level 2
  - Jika tugas dengan kemandirian lebih tinggi, pertimbangkan Level 3
  - Jika sudah melibatkan pemahaman teknis, pertimbangkan Teknisi Interior Muda

capabilities:
  - Memetakan profil ke jabatan teknisi interior yang sesuai

output:
